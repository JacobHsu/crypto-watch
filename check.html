<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🚀 To The Moon Checklist</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    :root {
      --bg:     #131722;
      --bg2:    #1c2030;
      --border: #2a2e39;
      --text:   #d1d4dc;
      --dim:    #787b86;
      --buy:    #26a69a;
      --sell:   #ef5350;
      --wait:   #9598a1;
      --accent: #2196f3;
      --font:   'Courier New', 'Lucida Console', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      line-height: 1.6;
      padding: 10px;
      max-width: 640px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────── */
    .hdr {
      border: 1px solid var(--dim);
      padding: 10px 12px 8px;
      margin-bottom: 14px;
    }
    .hdr-title {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 3px;
      text-align: center;
      padding-bottom: 6px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .hdr-meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      font-size: 10px;
      color: var(--dim);
    }
    .hdr-meta span {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }
    .hdr-meta .lbl { color: var(--dim); font-size: 9px; display: block; }

    .symbol-val {
      cursor: pointer;
      letter-spacing: 1px;
      font-weight: bold;
      color: var(--text);
    }
    .symbol-val:hover { color: var(--accent); }
    .symbol-input {
      background: none;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text);
      font-family: var(--font);
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      width: 80px;
      outline: none;
      padding: 0;
    }

    .tf-btns { display: flex; gap: 4px; flex-wrap: wrap; }
    .tf-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--font);
      font-size: 10px;
      padding: 1px 6px;
      cursor: pointer;
      border-radius: 2px;
    }
    .tf-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── SECTION ────────────────────── */
    .sec { margin-bottom: 18px; }
    .sec-hdr {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1.5px;
      color: var(--accent);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      margin-bottom: 8px;
    }

    /* ── COL GROUP ──────────────────── */
    .cg { margin-bottom: 6px; }
    .cg-name {
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--dim);
      padding-left: 2px;
      margin-bottom: 1px;
    }

    /* ── ITEM ROW ───────────────────── */
    .item { margin-bottom: 1px; }
    .item-row {
      display: flex;
      align-items: baseline;
      padding: 3px 2px;
      cursor: pointer;
      border-radius: 2px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .item-row:hover  { background: var(--bg2); }
    .item-row:active { background: #1a2540; }

    .item-name {
      font-size: 11px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .dots {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      color: var(--border);
      padding: 0 3px;
      font-size: 11px;
    }
    .dots::before {
      content: ' ··················································································';
      letter-spacing: 1px;
    }
    .item-status {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: bold;
      min-width: 58px;
      text-align: right;
      letter-spacing: 0.5px;
      color: var(--dim);
    }
    .item-status.buy  { color: var(--buy); }
    .item-status.sell { color: var(--sell); }
    .item-status.wait { color: var(--wait); }

    /* ── PANEL ──────────────────────── */
    .panel {
      display: none;
      margin: 2px 0 8px 10px;
      border-left: 2px solid var(--accent);
      padding: 10px 10px 8px;
      background: var(--bg2);
      border-radius: 0 2px 2px 0;
    }
    .panel.open { display: block; }

    .panel-q {
      font-size: 11px;
      color: var(--text);
      margin-bottom: 8px;
      font-style: italic;
    }
    .panel-hint {
      font-size: 9px;
      color: var(--dim);
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .panel-opts { display: flex; flex-direction: column; gap: 5px; }

    .opt-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
      border-radius: 2px;
      line-height: 1.5;
    }
    .opt-btn:hover, .opt-btn:active { border-color: var(--accent); }
    .opt-btn small {
      display: block;
      font-size: 9px;
      color: var(--dim);
      margin-top: 2px;
      line-height: 1.4;
    }

    .result {
      padding: 8px 10px;
      border-radius: 2px;
      font-size: 11px;
      font-weight: bold;
    }
    .result.buy  { background: rgba(38,166,154,.12);  border: 1px solid var(--buy);  color: var(--buy); }
    .result.sell { background: rgba(239,83,80,.12);   border: 1px solid var(--sell); color: var(--sell); }
    .result.wait { background: rgba(150,152,161,.08); border: 1px solid var(--wait); color: var(--wait); }

    .redo-btn {
      font-family: var(--font);
      font-size: 9px;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 5px;
      text-decoration: underline;
      padding: 0;
    }

    /* ── CHART COLORS ───────────────── */
    .cg { color: #4caf50; }   /* green  - Lips  / Supertrend buy */
    .cr { color: #e91e63; }   /* red    - Teeth / Supertrend sell */
    .cb { color: #2196f3; }   /* blue   - Jaw   / SAR */
    .co { color: #ff9800; }   /* orange - MA simple */
    .cc { color: #00bcd4; }   /* cyan   - EMA */
    .cw { color: #9c27b0; }   /* purple - special */

    /* ── SCORES ─────────────────────── */
    .sec-score {
      font-size: 10px;
      text-align: right;
      color: var(--dim);
      padding: 3px 2px;
      border-top: 1px solid var(--border);
      margin-top: 3px;
    }
    .sec-score .b { color: var(--buy); }
    .sec-score .s { color: var(--sell); }

    /* ── FINAL ──────────────────────── */
    .final {
      border: 1px solid var(--dim);
      padding: 12px;
      text-align: center;
      margin-top: 16px;
      margin-bottom: 20px;
    }
    .final-lbl { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-bottom: 6px; }
    .final-val { font-size: 20px; font-weight: bold; letter-spacing: 4px; }
    .final-val.buy  { color: var(--buy); }
    .final-val.sell { color: var(--sell); }
    .final-val.wait { color: var(--wait); }
    .final-score { font-size: 10px; color: var(--dim); margin-top: 6px; }
    .final-score .b { color: var(--buy); }
    .final-score .s { color: var(--sell); }

    /* ── SECTION HEADER ─────────────── */
    .sec-hdr-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sec-hdr-desc {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.5px;
      margin-top: 3px;
    }

    /* ── RESET BTN ──────────────────── */
    .reset-all {
      font-family: var(--font);
      font-size: 10px;
      color: var(--dim);
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 2px;
    }

    /* ── PRINT ──────────────────────── */
    @media print {
      body {
        background: #fff;
        color: #000;
        font-size: 8pt;
        max-width: none;
        padding: 8mm;
        line-height: 1.4;
      }
      :root {
        --bg: #fff; --bg2: #f8f8f8; --border: #ddd;
        --text: #000; --dim: #555;
        --buy: #006b5e; --sell: #c0392b; --wait: #555;
        --accent: #000;
      }
      .panel.open  { display: none !important; }
      .item-row:hover { background: none; }
      .reset-all   { display: none; }
      .cg, .cr, .cb, .co, .cc { color: #000 !important; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">🚀 TO THE MOON CHECKLIST</div>
  <div class="hdr-meta">
    <div>
      <span class="lbl">SYMBOL</span>
      <span id="symbol-display" class="symbol-val" onclick="editSymbol()">BTC</span>
    </div>
    <div><span class="lbl">DATE</span><span id="hdr-date">&nbsp;</span></div>
    <div>
      <span class="lbl">TIMEFRAME</span>
      <div class="tf-btns">
        <button class="tf-btn active" onclick="setTF(this)">1H</button>
        <button class="tf-btn" onclick="setTF(this)">4H</button>
        <button class="tf-btn" onclick="setTF(this)">1D</button>
        <button class="tf-btn" onclick="setTF(this)">1W</button>
      </div>
    </div>
  </div>
</div>

<!-- SECTIONS injected by JS -->
<div id="cl"></div>

<!-- FINAL -->
<div class="final">
  <div class="final-lbl">━━ FINAL DECISION ━━━━━━━━━━━━━━━━━━━━━━━━━</div>
  <div class="final-val wait" id="final-val">◈ WAIT</div>
  <div class="final-score" id="final-score">
    <span class="b">▲ BUY: 0</span> &nbsp;·&nbsp; ─ WAIT: 0 &nbsp;·&nbsp; <span class="s">▼ SELL: 0</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DECISION TREES  (l = label HTML, sub = sub HTML, r = result, n = next node)
// ═══════════════════════════════════════════════
const T = {

  alligator: {
    name: "WILLIAMS ALLIGATOR",
    tree: { q: "三條線的狀態？",
      opts: [
        { l: "三條線糾纏在一起",
          r: { s: "WAIT", t: "鱷魚睡覺 ─ 市場盤整，暫時觀望" } },
        { l: "三條線分開展開",
          n: { q: "價格與三條線的位置關係？",
            opts: [
              { l: "價格在三線<b>上方</b>",
                sub: "由上到下：<span class='cg'>綠線</span>（唇）· <span class='cr'>紅線</span>（牙）· <span class='cb'>藍線</span>（顎）",
                r: { s: "BUY",  t: "鱷魚張口向上 ─ 買入訊號" } },
              { l: "價格在三線<b>下方</b>",
                sub: "由上到下：<span class='cb'>藍線</span>（顎）· <span class='cr'>紅線</span>（牙）· <span class='cg'>綠線</span>（唇）",
                r: { s: "SELL", t: "鱷魚張口向下 ─ 賣出訊號" } }
            ] } }
      ] }
  },

  fractals: {
    name: "WILLIAMS FRACTALS",
    tree: {
      q: "圖表上有沒有新的小箭頭出現？",
      hint: "碎形指標會在 K 線上下方出現小 △▽ 箭頭，標記近期高低點。",
      opts: [
        { l: "出現 <b>△ 向上箭頭</b>，且目前 K 線已向上穿過那根箭頭的位置",
          r: { s: "BUY",  t: "突破上方碎形高點 ─ 多頭突破確認" } },
        { l: "有箭頭但 K 線尚未突破，或看不出明顯訊號",
          r: { s: "WAIT", t: "碎形存在但未突破 ─ 等待確認" } },
        { l: "出現 <b>▽ 向下箭頭</b>，且目前 K 線已向下穿過那根箭頭的位置",
          r: { s: "SELL", t: "跌破下方碎形低點 ─ 空頭跌破確認" } }
      ] }
  },

  multi_time: {
    name: "MULTI-TIME PERIOD",
    tree: { q: "畫面上各時間框架的趨勢方向？",
      hint: "指標會在 K 線旁顯示多個時間框架的趨勢標記。",
      opts: [
        { l: "大多數框架顯示向上（多頭）", r: { s: "BUY",  t: "多框架共振看漲 ─ 趨勢強勢" } },
        { l: "方向混合，不一致",            r: { s: "WAIT", t: "趨勢分歧 ─ 等待確認" } },
        { l: "大多數框架顯示向下（空頭）", r: { s: "SELL", t: "多框架共振看跌 ─ 趨勢弱勢" } }
      ] }
  },

  bb: {
    name: "BOLLINGER BANDS",
    tree: { q: "目前 K 線在布林通道的位置？",
      hint: "布林通道有上軌、中軌、下軌三條線，K 線在通道內移動。",
      opts: [
        { l: "K 線觸碰或突破<b>上軌</b>",
          n: { q: "上下兩條線之間的距離（帶寬）？",
            opts: [
              { l: "通道明顯張開（帶寬擴大）", r: { s: "BUY",  t: "強勢突破上軌 ─ 動能看漲" } },
              { l: "通道緊縮（帶寬很窄）",     r: { s: "WAIT", t: "帶寬收窄注意假突破 ─ 謹慎" } }
            ] } },
        { l: "K 線在中軌附近游走",
          r: { s: "WAIT", t: "中軌整理 ─ 方向待定" } },
        { l: "K 線觸碰或跌破<b>下軌</b>",
          n: { q: "上下兩條線之間的距離（帶寬）？",
            opts: [
              { l: "通道明顯張開（帶寬擴大）", r: { s: "SELL", t: "強勢跌破下軌 ─ 動能看跌" } },
              { l: "通道緊縮（帶寬很窄）",     r: { s: "WAIT", t: "帶寬收窄可能反彈 ─ 觀察" } }
            ] } }
      ] }
  },

  bb_kc_squeeze: {
    name: "BB / KC SQUEEZE",
    tree: { q: "BB（布林）兩條線是否收進 KC（肯特納）通道裡面？",
      hint: "同時看兩個通道的寬窄：BB 比 KC 窄且在 KC 裡面 = 擠壓中（能量積聚）；BB 比 KC 寬且突出 KC 外 = 擠壓釋放（行情啟動）。",
      opts: [
        { l: "<b>BB 收在 KC 裡面</b>（BB 比 KC 窄）",
          sub: "擠壓中 ─ 市場在蓄勢，尚未方向",
          r: { s: "WAIT", t: "BB/KC 擠壓中 ─ 蓄勢待發，等待突破確認" } },
        { l: "<b>BB 突出 KC 外側</b>（BB 比 KC 寬），K 線向<b>上</b>突破",
          r: { s: "BUY",  t: "擠壓釋放向上 ─ 看漲突破啟動" } },
        { l: "<b>BB 突出 KC 外側</b>（BB 比 KC 寬），K 線向<b>下</b>突破",
          r: { s: "SELL", t: "擠壓釋放向下 ─ 看跌突破啟動" } }
      ] }
  },

  keltner: {
    name: "KELTNER CHANNEL",
    tree: { q: "K 線在肯特納通道的位置？",
      opts: [
        { l: "突破<b>上軌</b>且站穩",  r: { s: "BUY",  t: "突破肯特納上軌 ─ 強勢上漲" } },
        { l: "在通道<b>內部</b>游走",  r: { s: "WAIT", t: "通道內整理 ─ 無明確方向" } },
        { l: "跌破<b>下軌</b>且站穩",  r: { s: "SELL", t: "跌破肯特納下軌 ─ 強勢下跌" } }
      ] }
  },

  supertrend: {
    name: "SUPERTREND",
    tree: { q: "K 線（蠟燭）在超級趨勢線的哪一側？",
      hint: "以 K 線位置為準，不要看線的顏色。線在K線下方=多頭，在上方=空頭。顏色是結果，位置才是訊號。",
      opts: [
        { l: "K 線在線的<b>上方</b>",
          sub: "線在K線下方（不管線是<span class='cg'>綠</span>或<span class='cr'>紅</span>）",
          r: { s: "BUY",  t: "K線在超級趨勢線上方 ─ 多頭訊號" } },
        { l: "K 線在線的<b>下方</b>",
          sub: "線在K線上方（不管線是<span class='cg'>綠</span>或<span class='cr'>紅</span>）",
          r: { s: "SELL", t: "K線在超級趨勢線下方 ─ 空頭訊號" } }
      ] }
  },

  ma: {
    name: "MA 20 / 50",
    tree: { q: "兩條移動平均線與 K 線的排列？",
      hint: "MA20（橙色較敏感），MA50（較慢）。",
      opts: [
        { l: "K 線 &gt; <span class='co'>MA20</span> &gt; MA50",
          sub: "多頭排列 ─ 由上到下 K線 · <span class='co'>橙線</span> · 白線",
          r: { s: "BUY",  t: "均線多頭排列 ─ 上升趨勢確認" } },
        { l: "兩條均線糾纏 / 交叉混亂",
          r: { s: "WAIT", t: "均線整理 ─ 趨勢不明確" } },
        { l: "MA50 &gt; <span class='co'>MA20</span> &gt; K 線",
          sub: "空頭排列 ─ 由上到下 白線 · <span class='co'>橙線</span> · K線",
          r: { s: "SELL", t: "均線空頭排列 ─ 下降趨勢確認" } }
      ] }
  },

  ema: {
    name: "EMA 20 / 50",
    tree: { q: "兩條指數移動平均線與 K 線的排列？",
      hint: "EMA20（青色較敏感），EMA50（較慢）。",
      opts: [
        { l: "K 線 &gt; <span class='cc'>EMA20</span> &gt; EMA50",
          sub: "多頭排列 ─ K線在<span class='cc'>青線</span>上方",
          r: { s: "BUY",  t: "EMA 多頭排列 ─ 上升趨勢確認" } },
        { l: "EMA 糾纏 / 排列混亂",
          r: { s: "WAIT", t: "EMA 整理 ─ 趨勢不明確" } },
        { l: "EMA50 &gt; <span class='cc'>EMA20</span> &gt; K 線",
          sub: "空頭排列 ─ K線在<span class='cc'>青線</span>下方",
          r: { s: "SELL", t: "EMA 空頭排列 ─ 下降趨勢確認" } }
      ] }
  },

  donchian: {
    name: "DONCHIAN CHANNELS",
    tree: { q: "K 線在唐奇安通道的位置？",
      hint: "通道上軌 = 近期最高點，下軌 = 近期最低點。",
      opts: [
        { l: "K 線突破<b>上軌</b>（創近期新高）", r: { s: "BUY",  t: "突破唐奇安上軌 ─ 多頭突破確認" } },
        { l: "K 線在通道<b>中間</b>區域",          r: { s: "WAIT", t: "通道中部整理 ─ 方向待定" } },
        { l: "K 線跌破<b>下軌</b>（創近期新低）", r: { s: "SELL", t: "跌破唐奇安下軌 ─ 空頭跌破確認" } }
      ] }
  },

  chandelier: {
    name: "CHANDELIER EXIT",
    tree: { q: "吊燈出場線的狀態？",
      hint: "有兩條線：藍色 Long Exit（追蹤多頭）跟在K線下方；橙色 Short Exit（追蹤空頭）跟在K線上方。",
      opts: [
        { l: "<span class='cb'>藍色 Long Exit</span> 在 K 線<b>下方</b>（持續）",
          r: { s: "BUY",  t: "Long Exit 支撐多頭 ─ 持多訊號" } },

      cg.innerHTML = `<div class="cg-name">${col.name}</div>`;
      col.items.forEach(key => {
        const def = T[key];
        if (!def) return;
        cg.appendChild(makeItem(`${sec.id}·${key}`, def));
      });
      secDiv.appendChild(cg);
    });

    const sc = document.createElement('div');
    sc.className = 'sec-score';
    sc.id = `sc·${sec.id}`;
    sc.innerHTML = scoreHTML(0, 0, 0);
    secDiv.appendChild(sc);

    root.appendChild(secDiv);
  });
}

function makeItem(id, def) {
  const wrap = document.createElement('div');
  wrap.className = 'item';
  wrap.innerHTML = `
    <div class="item-row" onclick="togglePanel('${id}')">
      <span class="item-name">${def.name}</span>
      <span class="dots"></span>
      <span class="item-status" id="st·${id}">[ ]</span>
    </div>
    <div class="panel" id="p·${id}"></div>`;
  return wrap;
}

// ═══════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════
function togglePanel(id) {
  const panel = document.getElementById(`p·${id}`);
  if (panel.classList.contains('open')) { panel.classList.remove('open'); return; }
  document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));

  // find def
  let def;
  for (const sec of STRUCTURE) {
    for (const col of sec.cols) {
      if (col.items.some(k => `${sec.id}·${k}` === id)) {
        const key = id.split('·')[1];
        def = T[key]; break;
      }
    }
    if (def) break;
  }
  if (!def) return;

  panel.classList.add('open');
  renderNode(panel, id, def.tree);
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderNode(panel, id, node) {
  panel._node = node;
  panel.innerHTML = `
    <div class="panel-q">${node.q}</div>
    ${node.hint ? `<div class="panel-hint">ℹ ${node.hint}</div>` : ''}
    <div class="panel-opts">
      ${node.opts.map((o, i) => `
        <button class="opt-btn" onclick="pick('${id}',${i})">
          ${o.l}${o.sub ? `<small>${o.sub}</small>` : ''}
        </button>`).join('')}
    </div>`;
}

function pick(id, i) {
  const panel = document.getElementById(`p·${id}`);
  const opt = panel._node.opts[i];
  if (opt.r) showResult(panel, id, opt.r);
  else if (opt.n) renderNode(panel, id, opt.n);
}

function showResult(panel, id, res) {
  const cls  = res.s === 'BUY' ? 'buy' : res.s === 'SELL' ? 'sell' : 'wait';
  const icon = res.s === 'BUY' ? '▲ BUY' : res.s === 'SELL' ? '▼ SELL' : '─ WAIT';
  panel.innerHTML = `
    <div class="result ${cls}">${icon} &nbsp;─&nbsp; ${res.t}</div>
    <button class="redo-btn" onclick="resetItem('${id}')">重新判斷</button>`;

  const st = document.getElementById(`st·${id}`);
  st.className = `item-status ${cls}`;
  st.textContent = icon;
  state[id] = res.s;
  updateScores();
}

function resetItem(id) {
  const panel = document.getElementById(`p·${id}`);
  panel.classList.remove('open');
  const st = document.getElementById(`st·${id}`);
  st.className = 'item-status';
  st.textContent = '[ ]';
  delete state[id];
  updateScores();
}

function resetSection(secId) {
  const sec = STRUCTURE.find(s => s.id === secId);
  if (!sec) return;
  sec.cols.forEach(col => col.items.forEach(key => resetItem(`${secId}·${key}`)));
}

// ═══════════════════════════════════════════════
// SCORES
// ═══════════════════════════════════════════════
function scoreHTML(b, w, s) {
  return `<span class="b">▲ BUY: ${b}</span> &nbsp;·&nbsp; ─ WAIT: ${w} &nbsp;·&nbsp; <span class="s">▼ SELL: ${s}</span>`;
}

function updateScores() {
  let gb = 0, gw = 0, gs = 0;
  STRUCTURE.forEach(sec => {
    let b = 0, w = 0, s = 0;
    sec.cols.forEach(col => col.items.forEach(key => {
      const v = state[`${sec.id}·${key}`];
      if      (v === 'BUY')  { b++; gb++; }
      else if (v === 'SELL') { s++; gs++; }
      else if (v === 'WAIT') { w++; gw++; }
    }));
    const el = document.getElementById(`sc·${sec.id}`);
    if (el) el.innerHTML = scoreHTML(b, w, s);
  });

  const total = gb + gw + gs;
  const fv = document.getElementById('final-val');
  document.getElementById('final-score').innerHTML = scoreHTML(gb, gw, gs);

  if (total === 0) { fv.className = 'final-val wait'; fv.textContent = '◈ WAIT'; return; }
  const bPct = gb / total, sPct = gs / total;
  if      (bPct >= 0.6) { fv.className = 'final-val buy';  fv.textContent = '▲ GO'; }
  else if (sPct >= 0.6) { fv.className = 'final-val sell'; fv.textContent = '▼ NO-GO'; }
  else                  { fv.className = 'final-val wait'; fv.textContent = '◈ WAIT'; }
}

function editSymbol() {
  const el = document.getElementById('symbol-display');
  const cur = el.textContent.trim();
  el.outerHTML = `<input id="symbol-input" class="symbol-input" value="${cur}" maxlength="10"
    onblur="saveSymbol(this)" onkeydown="if(event.key==='Enter')this.blur()">`;
  const inp = document.getElementById('symbol-input');
  inp.focus(); inp.select();
}
function saveSymbol(inp) {
  const val = inp.value.trim().toUpperCase() || 'BTC';
  inp.outerHTML = `<span id="symbol-display" class="symbol-val" onclick="editSymbol()">${val}</span>`;
}

function setTF(btn) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

build();

const _d = new Date();
document.getElementById('hdr-date').textContent =
  `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;
</script>
</body>
